title: "SIG//MAGAN"
title_separator: "|"
subtitle: "Security Research Journal"
name: &name "magan20"
description: &description "보안 리서치, 오펜시브 사고, 디펜시브 엔지니어링, 자동화 노트를 기록하는 기술 블로그."
url: "https://magan20.github.io"
baseurl: ""
repository: "magan20/magan20.github.io"
locale: "ko-KR"
timezone: "Asia/Seoul"
logo: "/assets/images/site-mark.svg"
masthead_title: "SIG//MAGAN"
breadcrumbs: true
words_per_minute: 230
enable_copy_code_button: true
search: true
search_full_content: true
minimal_mistakes_skin: "default"
theme: minimal-mistakes-jekyll
permalink: /:title/
paginate: 6
paginate_path: /page/:num/

author:
  name: *name
  avatar: "/assets/images/avatar-grid.svg"
  bio: "공격과 방어의 경계에서 얻은 리서치, 운영 노트, 도구 제작 과정을 차분하게 기록합니다."
  location: "Seoul / Remote"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/magan20"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:audwls2160@naver.com"
    - label: "RSS"
      icon: "fas fa-fw fa-rss"
      url: "/feed.xml"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/magan20"
    - label: "RSS"
      icon: "fas fa-fw fa-rss"
      url: "/feed.xml"
    - label: "About"
      icon: "fas fa-fw fa-circle-info"
      url: "/about/"

social:
  type: Person
  name: *name
  links:
    - "https://github.com/magan20"

atom_feed:
  path: /feed.xml

include:
  - _pages

exclude:
  - vendor
  - .bundle
  - README.md
  - Gemfile.lock
  - bin
  - tmp

markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  toc_levels: 1..3

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      related: true
      share: false
      comments: false
      toc: true
      toc_sticky: true
      classes:
        - wide
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
      classes:
        - wide

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

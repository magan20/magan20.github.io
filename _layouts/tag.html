---
layout: page
---

{% include lang.html %}

<div id="page-tag" class="signal-taxonomy-page">
  <h1 class="ps-lg-2">
    <i class="fa fa-tag fa-fw text-muted"></i>
    {{ page.title }}
    <span class="lead text-muted ps-2">{{ page.posts | size }}</span>
  </h1>

  <div class="signal-taxonomy-list">
    {% for post in page.posts %}
      {% include archive-post-card.html post=post %}
    {% endfor %}
  </div>
</div>

---
layout: default
---
<section class="page-hero">
  <div class="shell page-hero-grid">
    <div>
      {% if page.kicker %}
        <p class="section-kicker">{{ page.kicker }}</p>
      {% endif %}
      <h1>{{ page.title }}</h1>
      {% if page.description %}
        <p class="page-description">{{ page.description }}</p>
      {% endif %}
    </div>
  </div>
</section>

<section class="surface-section">
  <div class="shell prose page-prose">
    {{ content }}
  </div>
</section>

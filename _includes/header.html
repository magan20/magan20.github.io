<header class="site-header">
  <div class="shell header-shell">
    <a class="brand-link" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}">
      <span class="brand-mark">SIG//MAGAN</span>
      <span class="brand-subtitle">{{ site.data.navigation.brand.subtitle }}</span>
    </a>
    <nav class="main-nav" aria-label="Main">
      {% for item in site.data.navigation.main %}
        <a href="{{ item.url | relative_url }}" class="nav-link {% if page.url == item.url %}is-current{% endif %}">
          <span>{{ item.title_en }}</span>
          <small>{{ item.title_ko }}</small>
        </a>
      {% endfor %}
    </nav>
    <div class="header-search" data-header-search-root>
      <label class="header-search-shell" for="site-search">
        <span class="visually-hidden">Search site</span>
        <input
          id="site-search"
          class="header-search-input"
          type="search"
          placeholder="Search posts, tags, categories"
          autocomplete="off"
          data-header-search-input
        >
        <span class="search-shortcut">/</span>
      </label>
      <div class="header-search-panel" hidden data-header-search-panel>
        <div class="header-search-meta" data-header-search-meta>
          <span>Search</span>
          <span>posts, research, tags, categories</span>
        </div>
        <div class="search-results search-results-inline" data-header-search-results>
          <p class="muted">검색어를 입력하거나 최근 글을 살펴보세요.</p>
        </div>
      </div>
    </div>
  </div>
</header>

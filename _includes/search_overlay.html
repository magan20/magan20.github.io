<div class="search-overlay" hidden data-search-overlay aria-hidden="true">
  <div class="search-panel">
    <div class="search-panel-head">
      <div>
        <p class="section-kicker">Search / 탐색</p>
        <h2>Posts, research, tags, and categories</h2>
      </div>
      <button type="button" class="search-close" data-close-search aria-label="Close search">Close</button>
    </div>
    <label class="search-input-shell">
      <span>Query</span>
      <input type="search" placeholder="Try: detection, web-security, threat-hunting" data-search-input>
    </label>
    <div class="search-hint">
      <span>`/` 키로 언제든 검색을 열 수 있습니다.</span>
      <span>카테고리, 태그, 설명까지 함께 조회합니다.</span>
    </div>
    <div class="search-results" data-search-results>
      <p class="muted">검색어를 입력하면 결과가 여기에 표시됩니다.</p>
    </div>
  </div>
</div>

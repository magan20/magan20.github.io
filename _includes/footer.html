<footer class="site-footer">
  <div class="shell footer-shell">
    <div>
      <p class="footer-kicker">Security Journal</p>
      <h2>{{ site.title }}</h2>
      <p>{{ site.data.navigation.brand.statement }}</p>
    </div>
    <div class="footer-links">
      {% for item in site.data.navigation.social %}
        <a href="{{ item.url }}" {% if item.url contains 'http' %}target="_blank" rel="noreferrer"{% endif %}>{{ item.label }}</a>
      {% endfor %}
    </div>
  </div>
</footer>
